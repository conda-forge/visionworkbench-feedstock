context:
  name: visionworkbench
  version: "3.7.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/visionworkbench/visionworkbench/archive/refs/tags/${{ version }}.zip
  sha256: f4c4f5009f63376bc29983103ae3a04e8cadd45014e47c9f828bafcb520b2222

build:
  number: 0
  skip: win
  script: build.sh

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - cmake >=3.15
    - make
  host:
    - flann
    - libboost-devel
    - libgdal
    - libblas * *openblas
    - openblas
    - libopencv
    - libjpeg-turbo
    - libpng
    - libtiff

tests:
  # Skip when cross-compiling (e.g. osx_arm64 built on osx_64); the target
  # binary cannot run on the build host.
  - if: target_platform == build_platform
    then:
      script:
        - hillshade $PREFIX/share/vw/tests/tinyDemAN.tif

about:
  homepage: https://github.com/visionworkbench/visionworkbench
  summary: 'An image processing and computer vision library published by NASA'
  description: |
    The NASA Vision Workbench is a general purpose image processing and computer vision library. It is part of the Ames Stereo Pipeline. 
  license: Apache-2.0
  license_family: Apache
  license_file: COPYING
  documentation: https://github.com/visionworkbench/visionworkbench
  repository: https://github.com/visionworkbench/visionworkbench

extra:
  recipe-maintainers:
    - oleg-alexandrov
    - hobu
